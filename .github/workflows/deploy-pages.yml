# Publishes only the static files below — not the whole repo (avoids broken uploads).
# After first push: Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site folder
        run: |
          mkdir -p _site
          cp index.html .nojekyll _site/
          if [ -f app.js ]; then cp app.js _site/; fi
          if [ -f styles.css ]; then cp styles.css _site/; fi
          ls -la _site

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
